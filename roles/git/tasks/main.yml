---

- name: Configure git default editor
  git_config:
    name: core.editor
    scope: global
    value: "{{ git.editor }}"

- name: Configure git user name
  git_config:
    name: user.name
    scope: global
    value: "{{ git.user.name }}"

- name: Configure git user email 
  git_config:
    name: user.email
    scope: global
    value: "{{ git.user.email }}"

- name: Configure git user signing key
  git_config:
    name: user.signingkey
    scope: global
    value: "{{ git.user.signing_key }}"
    
- name: Configure git user signing format
  git_config:
    name: gpg.format
    scope: global
    value: "{{ git.commit_signing.format }}"

- name: Configure commit auto signing
  git_config:
    name: commit.gpgsign
    scope: global
    value: "true"

- name: Configure git default editor
  git_config:
    name: core.editor
    scope: global
    value: "{{ git.editor }}"

- name: Configure rebase autosquash
  git_config:
    name: rebase.autosquash
    scope: global
    value: "true"

- name: Configure git aliases
  git_config:
    name: "alias.{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  with_items: "{{ git.alias }}"
